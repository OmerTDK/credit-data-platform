version: 2

models:
  - name: stg_loanbook__borrower
    description: >
      One row per borrower: banded demographic attributes and the credit score
      drawn within the score band, cleaned and typed from the landing zone.
    columns:
      - name: borrower_id
        description: Natural key of the borrower.
        data_tests:
          - unique
          - not_null
      - name: age_band
        description: Borrower age band at origination.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["18-24", "25-34", "35-44", "45-54", "55-64", "65+"]
      - name: income_band
        description: Annual income band at origination.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [under_25k, 25k_to_50k, 50k_to_75k, 75k_to_100k, over_100k]
      - name: region
        description: US census region of the borrower.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [northeast, midwest, south, west]
      - name: score_band
        description: Credit score band the borrower was drawn into.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [subprime, near_prime, prime, prime_plus, super_prime]
      - name: credit_score
        description: Credit score drawn uniformly within the score band (300-850).
        data_tests:
          - not_null

  - name: stg_loanbook__loan
    description: >
      One row per originated personal loan: contractual terms as written at
      origination, cleaned and typed from the landing zone.
    columns:
      - name: loan_id
        description: Natural key of the loan.
        data_tests:
          - unique
          - not_null
      - name: borrower_id
        description: Natural key of the borrower the loan was originated for.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_loanbook__borrower')
                field: borrower_id
      - name: product_type
        description: Credit product of the loan; Phase 1 generates personal loans only.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [personal_loan]
      - name: origination_month
        description: First day of the calendar month the loan was originated in.
        data_tests:
          - not_null
      - name: principal_amount
        description: Originated principal in account currency (decimal, 2 dp).
        data_tests:
          - not_null
      - name: term_months
        description: Contractual term of the loan in months.
        data_tests:
          - not_null
      - name: interest_rate
        description: Annual interest rate as a decimal (0.129 = 12.9% APR).
        data_tests:
          - not_null
      - name: monthly_payment_amount
        description: Fixed monthly installment from the amortization schedule.
        data_tests:
          - not_null
      - name: score_band
        description: Borrower score band at origination, denormalized for pricing analysis.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [subprime, near_prime, prime, prime_plus, super_prime]

  - name: stg_loanbook__monthly_performance
    description: >
      One row per loan per month on book: payments, balances, delinquency
      bucket, and loan status emitted by the generator's state machine.
      Grain is (loan_id, months_on_book), enforced by a singular test.
    columns:
      - name: loan_id
        description: Natural key of the loan this performance row belongs to.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_loanbook__loan')
                field: loan_id
      - name: months_on_book
        description: >
          1-based loan age in months; the row reports the month
          origination_month + months_on_book.
        data_tests:
          - not_null
      - name: report_month
        description: First day of the calendar month this row reports on.
        data_tests:
          - not_null
      - name: beginning_balance_amount
        description: Outstanding principal at the start of the month.
        data_tests:
          - not_null
      - name: scheduled_payment_amount
        description: Installments contractually due this month.
        data_tests:
          - not_null
      - name: actual_payment_amount
        description: Amount actually paid this month.
        data_tests:
          - not_null
      - name: principal_paid_amount
        description: Principal portion of the actual payment.
        data_tests:
          - not_null
      - name: interest_paid_amount
        description: Interest portion of the actual payment.
        data_tests:
          - not_null
      - name: ending_balance_amount
        description: Outstanding principal at the end of the month.
        data_tests:
          - not_null
      - name: principal_writeoff_amount
        description: Principal written off this month; non-zero only on default.
        data_tests:
          - not_null
      - name: recovery_amount
        description: Post-default recovery received this month.
        data_tests:
          - not_null
      - name: delinquency_bucket
        description: Days-past-due bucket from the delinquency state machine.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [current, dpd_30, dpd_60, dpd_90_plus, default]
      - name: loan_status
        description: Lifecycle status of the loan as of this month.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [active, paid_off, defaulted, recovery_complete]
      - name: is_prepayment
        description: Whether the loan terminated this month by voluntary full prepayment.
        data_tests:
          - not_null
