name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: mkdir -p data/local
      - run: uv run sqlfluff lint models seeds snapshots tests/dbt
      - run: make generate
      - run: uv run pytest -v
      - run: uv run dbt parse
        env:
          DBT_PROFILES_DIR: .
      - run: uv run dbt build --select staging
        env:
          DBT_PROFILES_DIR: .
