# Generate and publish dbt docs to GitHub Pages.
#
# Triggers on push to main (after a PR merges) and on manual dispatch.
# The generated site is deployed to https://<user>.github.io/credit-data-platform/

name: dbt-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --locked

      - name: Install dbt packages
        run: uv run dbt deps
        env:
          DBT_PROFILES_DIR: .

      - name: Generate synthetic landing zone
        run: make generate

      - name: Build dbt models (DuckDB dev target)
        run: |
          mkdir -p data/local
          uv run dbt build --exclude tag:elementary
        env:
          DBT_PROFILES_DIR: .

      - name: Generate dbt docs
        run: uv run dbt docs generate
        env:
          DBT_PROFILES_DIR: .

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
