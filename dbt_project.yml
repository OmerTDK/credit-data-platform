name: credit_platform
version: "0.1.0"
profile: credit_platform

flags:
  send_anonymous_usage_stats: false
  # Required from dbt 1.8+ for Elementary's materialization overrides.
  require_explicit_package_overrides_for_builtin_materializations: false

model-paths: ["models"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
test-paths: ["tests/dbt"]

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  elementary:
    +schema: elementary
  credit_platform:
    staging:
      +materialized: view
      +schema: stg
    intermediate:
      +materialized: view
      +schema: int
    dwh:
      +materialized: table
      +schema: dwh
    marts:
      +materialized: table
      risk:
        +schema: mart_risk
      finance:
        +schema: mart_finance

vars:
  # ecl_as_of_date and ecl_sicr_dpd_threshold intentionally omitted:
  # - ECL reference date is derived from dim_loan_current_state.state_as_of_month, not a var.
  # - SICR DPD backstop is bucket-based (dpd_30, dpd_60), not a configurable numeric threshold.
  ecl_sicr_lifetime_pd_multiple: 2.0
  ecl_sicr_pd_delta_bp: 200
  ecl_include_discount_factor: false
  ecl_credit_card_behavioural_maturity_months: 24

  # Elementary result-capture (on-run-end hooks) is OFF by default so the scoped
  # dbt builds (dbt-build-dwh/risk/ecl) don't require the Elementary model layer.
  # The full Dagster materialization exports ELEMENTARY_CAPTURE=1, which builds
  # the Elementary models and enables capture so the observability report has data.
  disable_run_results: "{{ env_var('ELEMENTARY_CAPTURE', '0') != '1' }}"
  disable_tests_results: "{{ env_var('ELEMENTARY_CAPTURE', '0') != '1' }}"
  disable_dbt_artifacts_autoupload: "{{ env_var('ELEMENTARY_CAPTURE', '0') != '1' }}"
  disable_dbt_invocation_autoupload: "{{ env_var('ELEMENTARY_CAPTURE', '0') != '1' }}"

seeds:
  credit_platform:
    ecl_lgd_parameters:
      +column_types:
        product_type: VARCHAR
        lgd_rate: DOUBLE
        lgd_source_note: VARCHAR
    ecl_ead_parameters:
      +column_types:
        product_type: VARCHAR
        ccf_rate: DOUBLE
        ccf_source_note: VARCHAR
    ecl_scenario_weights:
      +column_types:
        scenario_name: VARCHAR
        scenario_weight: DOUBLE
        pd_scalar: DOUBLE
        lgd_scalar: DOUBLE
    ecl_watchlist:
      +column_types:
        loan_id: VARCHAR
