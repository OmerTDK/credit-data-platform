name: credit_platform
version: "0.1.0"
profile: credit_platform

flags:
  send_anonymous_usage_stats: false

model-paths: ["models"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
test-paths: ["tests/dbt"]

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  credit_platform:
    staging:
      +materialized: view
      +schema: stg
    intermediate:
      +materialized: view
      +schema: int
    dwh:
      +materialized: table
      +schema: dwh
    marts:
      +materialized: table
      risk:
        +schema: mart_risk
      finance:
        +schema: mart_finance

vars:
  ecl_as_of_date: "latest"
  ecl_sicr_dpd_threshold: 30
  ecl_sicr_lifetime_pd_multiple: 2.0
  ecl_sicr_pd_delta_bp: 200
  ecl_include_discount_factor: false
  ecl_credit_card_behavioural_maturity_months: 24

seeds:
  credit_platform:
    ecl_lgd_parameters:
      +column_types:
        product_type: VARCHAR
        lgd_rate: DOUBLE
        lgd_source_note: VARCHAR
    ecl_ead_parameters:
      +column_types:
        product_type: VARCHAR
        ccf_rate: DOUBLE
        ccf_source_note: VARCHAR
    ecl_scenario_weights:
      +column_types:
        scenario_name: VARCHAR
        scenario_weight: DOUBLE
        pd_scalar: DOUBLE
        lgd_scalar: DOUBLE
    ecl_watchlist:
      +column_types:
        loan_id: VARCHAR
